name: Docker Bake
description: Build and optionally push Docker images with bake

inputs:
  target:
    description: Bake target name (e.g. default, base, core-devel)
    required: false
    default: default
  push:
    description: Push images to registry
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Bake ${{ inputs.target }}
      shell: bash
      run: |
        if [ "${{ inputs.push }}" = "true" ]; then
          docker buildx bake \
            --set "*.output=type=registry" \
            -f docker/docker-bake.hcl \
            ${{ inputs.target }}
        else
          docker buildx bake \
            -f docker/docker-bake.hcl \
            ${{ inputs.target }}
        fi
