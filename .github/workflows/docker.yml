name: Docker Build and Push

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-mode:
    runs-on: ubuntu-latest
    outputs:
      build_mode: ${{ steps.detect.outputs.build_mode }}
      git_hash: ${{ steps.detect.outputs.git_hash }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Detect build mode
        id: detect
        shell: bash
        run: |
          case "${{ github.ref }}" in
            refs/heads/master)
              echo "build_mode=master" >> "$GITHUB_OUTPUT"
              ;;
            refs/tags/*)
              echo "build_mode=release" >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "build_mode=develop" >> "$GITHUB_OUTPUT"
              ;;
          esac
          HASH="${{ github.sha }}"
          echo "git_hash=${HASH:0:7}" >> "$GITHUB_OUTPUT"

  docker:
    needs: detect-mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/docker-setup
        with:
          ghcr-token: ${{ secrets.GH_PAT }}

      - name: Build and push
        uses: docker/bake-action@v7
        with:
          source: .
          files: docker/docker-bake.hcl
          targets: default
          push: true
          set: |
            *.cache-from=type=gha,scope=clover2-dev
            *.cache-to=type=gha,scope=clover2-dev,mode=max
          vars: |
            BUILD_MODE=${{ needs.detect-mode.outputs.build_mode }}
            CLOVER2_DEV_GIT_HASH=${{ needs.detect-mode.outputs.git_hash }}
            CLOVER2_DEV_VERSION=${{ needs.detect-mode.outputs.version }}
            USE_REGISTRY_CONTEXTS=false
