name: Docker Build and Push

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  detect-mode:
    runs-on: ubuntu-latest
    outputs:
      build_mode: ${{ steps.detect.outputs.build_mode }}
      git_hash: ${{ steps.detect.outputs.git_hash }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Detect build mode
        id: detect
        shell: bash
        run: |
          case "${{ github.ref }}" in
            refs/heads/master)
              echo "build_mode=master" >> "$GITHUB_OUTPUT"
              ;;
            refs/tags/*)
              echo "build_mode=release" >> "$GITHUB_OUTPUT"
              echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "build_mode=develop" >> "$GITHUB_OUTPUT"
              ;;
          esac
          HASH="${{ github.sha }}"
          echo "git_hash=${HASH:0:7}" >> "$GITHUB_OUTPUT"

  docker:
    needs: detect-mode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/docker-build
        with:
          ghcr-token: ${{ secrets.GH_PAT }}
          bake-target: default
          needs-source: true
