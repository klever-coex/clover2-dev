---
- name: Create temporary directory for PX4 setup script
  ansible.builtin.tempfile:
    state: directory
  register: px4_tmpdir
  tags:
    - px4
    - px4-deps

- name: Download PX4 setup script (ubuntu.sh)
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/PX4/PX4-Autopilot/{{ px4_version }}/Tools/setup/ubuntu.sh"
    dest: "{{ px4_tmpdir.path }}/ubuntu.sh"
    mode: "0755"
  tags:
    - px4
    - px4-deps

- name: Download PX4 Python requirements
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/PX4/PX4-Autopilot/{{ px4_version }}/Tools/setup/requirements.txt"
    dest: "{{ px4_tmpdir.path }}/requirements.txt"
  tags:
    - px4
    - px4-deps

- name: Run PX4 ubuntu.sh setup script
  become: true
  ansible.builtin.command:
    cmd: "bash {{ px4_tmpdir.path }}/ubuntu.sh"
  changed_when: false
  tags:
    - px4
    - px4-deps
